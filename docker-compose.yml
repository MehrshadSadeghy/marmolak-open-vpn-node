services:
  openvpn-node:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      OPENVPN_NODE_ENVIRONMENT: docker
      NODE_API_SECRET: ${NODE_API_SECRET:-change-me-node-secret}
      MOCK_MODE: ${MOCK_MODE:-true}
      SERVER_HOST: ${SERVER_HOST:-vpn.example.com}
      SERVER_PORT: ${SERVER_PORT:-1194}
      SERVER_PROTO: ${SERVER_PROTO:-udp}
      OPENVPN_DOTENV_PATHS: ${OPENVPN_DOTENV_PATHS:-/etc/openvpn/open-node.env}
    volumes:
      - /etc/openvpn:/etc/openvpn
      - ${OPENVPN_HOST_ENV_FILE:-./.env}:/etc/openvpn/open-node.env
