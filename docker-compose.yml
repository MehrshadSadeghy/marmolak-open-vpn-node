services:
  openvpn-node:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    privileged: true
    userns_mode: host
    user: "0:0"
    network_mode: host
    environment:
      OPENVPN_NODE_ENVIRONMENT: docker
      NODE_API_SECRET: ${NODE_API_SECRET:-change-me-node-secret}
      MOCK_MODE: ${MOCK_MODE:-true}
      SERVER_HOST: ${SERVER_HOST:-vpn.example.com}
      SERVER_PORT: ${SERVER_PORT:-1194}
      SERVER_PROTO: ${SERVER_PROTO:-udp}
      OPENVPN_DOTENV_PATHS: ${OPENVPN_DOTENV_PATHS:-/etc/openvpn/open-node.env}
      OPENVPN_SERVER_CONF_PATH: /mnt/openvpn/server.conf
      OPENVPN_ENDPOINT_STATE_PATH: /mnt/openvpn/node-endpoint.json
      OPENVPN_PKI_DIR: ${OPENVPN_PKI_DIR:-/mnt/openvpn-pki}
    volumes:
      # On host first: sudo mount --bind /etc/openvpn/server/server.conf ./server.conf
      - ./server.conf:/mnt/openvpn/server.conf
      # Mount PKI at /mnt/openvpn-pki (avoid nested /etc/openvpn paths in the image)
      - type: bind
        source: ${OPENVPN_PKI_HOST_PATH:-./host-pki}
        target: /mnt/openvpn-pki
        bind:
          propagation: rshared
      - /etc/openvpn/ccd:/etc/openvpn/ccd
      - /var/log/openvpn/openvpn-status.log:/var/log/openvpn/openvpn-status.log:ro
      - ${OPENVPN_HOST_ENV_FILE:-./.env}:/etc/openvpn/open-node.env
